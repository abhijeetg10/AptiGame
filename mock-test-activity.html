<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Test in Progress - AptiGame</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #ffffff;
            font-family: 'Outfit', sans-serif;
        }

        .game-frame {
            width: 100%;
            height: calc(100vh - 80px);
            border: none;
            display: block;
        }

        /* Standardized Overlays */
        .mock-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(16px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: white;
        }

        .overlay-card {
            background: white;
            color: #0f172a;
            padding: 3rem;
            border-radius: 32px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cardPop {
            from { transform: scale(0.9) translateY(30px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .instruction-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
            text-align: left;
        }

        .ins-item {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }

        .ins-icon {
            width: 40px;
            height: 40px;
            background: #f1f5f9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            flex-shrink: 0;
        }

        .begin-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1.25rem 2.5rem;
            border-radius: 16px;
            font-size: 1.25rem;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(201, 0, 118, 0.3);
        }

        .begin-btn:hover {
            transform: translateY(-3px);
            background: #b00068;
            box-shadow: 0 20px 25px -5px rgba(201, 0, 118, 0.4);
        }

        .example-image {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 16px;
            margin: 1.5rem 0;
            background: #f8fafc;
        }

        .mock-nav {
            height: 80px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2.5rem;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .timer-box {
            background: white;
            color: var(--text-main);
            padding: 0.75rem 2rem;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1.75rem;
            border: 1px solid var(--border-color);
            font-family: 'Space Grotesk', monospace;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .timer-box::before {
            content: '\f2f2';
            font-family: 'Font Awesome 6 Free';
            color: var(--primary);
            font-size: 1.25rem;
        }

        .timer-box.warning {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
            border-color: rgba(239, 68, 68, 0.3);
            animation: pulse-red 1s infinite;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .exit-btn {
            background: var(--bg-alt);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.3s;
        }

        .exit-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fecaca;
        }

        /* Proctoring Overlay */
        #proctor-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .proctor-card {
            background: white;
            padding: 3rem;
            border-radius: 24px;
            max-width: 500px;
            width: 100%;
            border-bottom: 8px solid #ef4444;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .proctor-alert-icon {
            font-size: 4rem;
            color: #ef4444;
            margin-bottom: 1.5rem;
        }

        .proctor-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 1rem;
        }

        .proctor-msg {
            color: #64748b;
            margin-bottom: 2rem;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .proctor-stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2.5rem;
            background: #f8fafc;
            padding: 1rem;
            border-radius: 12px;
        }

        .strike-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .strike-val {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ef4444;
        }

        .strike-lbl {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
        }

        .proctor-btn {
            background: #1e293b;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: var(--radius-md);
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .proctor-btn:hover {
            background: #0f172a;
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="mock-nav">
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <a href="index.html" class="logo" style="text-decoration: none;">
                <img src="logo.png" alt="Logo" class="logo-img" style="height: 48px;">
                <span style="font-weight: 800; font-size: 1.5rem; color: var(--text-main);">AptiGame</span>
            </a>
            <div style="height: 32px; width: 2px; background: var(--border-color);"></div>
            <div id="company-name" style="font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); font-size: 0.9rem;">MOCK ASSESSMENT</div>
        </div>

        <div class="timer-box" id="global-timer">24:00</div>

        <button class="exit-btn" onclick="abortTest()">
            <i class="fas fa-sign-out-alt"></i> ABORT TEST
        </button>
    </nav>

    <div class="progress-bar" style="top: 80px;">
        <div class="progress-fill" id="progress-fill"></div>
    </div>

    <iframe id="game-frame" class="game-frame" src=""></iframe>

    <div id="proctor-overlay">
        <div class="proctor-card">
            <div class="proctor-alert-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <div class="proctor-title" id="alert-title">Proctoring Alert</div>
            <p class="proctor-msg" id="alert-msg">Your activity has triggered a security alert. Please return to the test immediately.</p>
            
            <div class="proctor-stats">
                <div class="strike-info">
                    <span class="strike-val" id="strike-count">0 / 3</span>
                    <span class="strike-lbl">Violations</span>
                </div>
            </div>

            <button class="proctor-btn" onclick="resumeTest()">I UNDERSTAND, RESUME TEST</button>
        </div>
    </div>

    <script type="module" src="mock-test-engine.js"></script>
    <script>
        async function abortTest() {
            if(confirm("Are you sure? You will lose all progress in this mock test.")) {
                try {
                    // Try to update status to aborted via the engine's exposed function
                    if (window.updateMockStatus) {
                        await window.updateMockStatus("aborted");
                    }
                } catch (e) {
                    console.error("Error updating abort status:", e);
                }
                sessionStorage.removeItem('mock_test_active');
                sessionStorage.removeItem('mock_test_state');
                window.location.href = 'mock-tests.html';
            }
        }
    </script>
</body>
</html>
